[plugin]
name = "FixtureAudio"
vendor = "FzaudioFixtures"
version = "1.0.0"
formats = ["vst3", "au", "clap"]

[project]
type = "cmake"
path = "."

[build]
config = "Release"
universal_macos = false

[signing.macos]
enabled = true
notarize = false
team_id = ""
developer_id_application = "-"
notarytool_profile = ""

[package]
output = "signed-dist"
